<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatusOwl 🦉</title>
  <link rel="stylesheet" href="status.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">StatusOwl 🦉</h1>
      <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <div class="refresh-timer" id="refresh-timer">
          <span class="refresh-timer-dot"></span>
          <span class="refresh-timer-text">Refreshing in 60s</span>
        </div>
      </div>
    </header>

    <!-- Overall Status Banner -->
    <section class="status-banner" id="overall-status">
      <div class="status-indicator">
        <span class="status-dot" id="overall-dot"></span>
        <span class="status-text" id="overall-text">Loading...</span>
      </div>
    </section>

    <!-- Services List -->
    <section class="services-section">
      <h2>System Status</h2>
      <div class="services-list" id="services-list">
        <!-- Services will be rendered here -->
        <div class="loading">Loading services...</div>
      </div>
    </section>

    <!-- Open Incidents -->
    <section class="incidents-section" id="incidents-section" style="display: none;">
      <h2>Open Incidents</h2>
      <div class="incidents-list" id="incidents-list">
        <!-- Incidents will be rendered here -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Powered by <a href="https://statusowl.com">StatusOwl</a></p>
    </footer>
  </div>

  <script src="status.js"></script>
</body>
</html>
